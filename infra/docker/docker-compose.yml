services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tickitss_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy_marketplace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickitss_network

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tickitss_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tickitss_network

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: tickitss_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pharmacy_marketplace}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-super-secret-key}
      REFRESH_SECRET_KEY: ${REFRESH_SECRET_KEY:-change-me-refresh-secret}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REQUIRE_CLOUDFLARE: ${REQUIRE_CLOUDFLARE:-false}
      REQUIRE_APPCHECK: ${REQUIRE_APPCHECK:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tickitss_network

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: tickitss_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - tickitss_network

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tickitss_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - tickitss_network

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  tickitss_network:
    driver: bridge
